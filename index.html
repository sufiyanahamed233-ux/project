<!DOCTYPE html>
<html>

<head>
    <title>Hackathon App</title>
</head>

<body>

    <h1>🚀 Request App</h1>

    <input type="text" id="inputBox" placeholder="Enter request..." />
    <button onclick="addItem()">Submit</button>

    <ul id="list"></ul>

    <!-- Supabase CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@1"></script>

    <script>
        const supabaseClient = supabase.createClient(
            "https://skmwduzxisvopvpfypgt.supabase.co",
            "YOUR_ANON_KEY"
        );

        async function addItem() {
            const value = document.getElementById("inputBox").value;
            if (!value) return;

            const {
                error
            } = await supabaseClient
                .from("requests")
                .insert([{
                    text: value
                }]);

            if (error) {
                alert("Insert failed: " + error.message);
                return;
            }

            document.getElementById("inputBox").value = "";
            loadData();
        }

        async function loadData() {
            const {
                data,
                error
            } = await supabaseClient
                .from("requests")
                .select("*")
                .order("id", {
                    ascending: false
                });

            if (error) {
                console.error(error);
                return;
            }

            const list = document.getElementById("list");
            list.innerHTML = "";

            data.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item.text;
                list.appendChild(li);
            });
        }

        loadData();
    </script>

</body>

</html>
