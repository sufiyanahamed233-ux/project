<!DOCTYPE html>

<html>

<head>
    <title>Hackathon App</title>

<body>

    ```
    <h1>🚀 Request App</h1>

    <input type="text" id="inputBox" placeholder="Enter request..." />
    <button onclick="addItem()">Submit</button>

    <ul id="list"></ul>

    <!-- Supabase CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@1"></script>

    <script>
        const supabaseClient = supabase.createClient(
            "https://skmwduzxisvopvpfypgt.supabase.co",
            "YOUR_ANON_KEY"
        );

        async function addItem() {
            const value = document.getElementById("inputBox").value;
            if (!value.trim()) return;

            // 1️⃣ Save to Supabase
            const {
                error
            } = await supabaseClient
                .from("requests")
                .insert([{
                    text: value
                }]);

            if (error) {
                alert("Error: " + error.message);
                return;
            }

            // 2️⃣ Send to n8n AND GET RESPONSE ✅
            const res = await fetch("https://sufiyan23.app.n8n.cloud/webhook-test/new-request", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    text: value
                })
            });

            const data = await res.json();
            console.log("AI Response:", data);

            // 3️⃣ SHOW AI RESPONSE IN UI ✅
            const list = document.getElementById("list");

            const userLi = document.createElement("li");
            userLi.innerText = "🧑 " + value;

            const aiLi = document.createElement("li");
            aiLi.innerText = "🤖 " + data.response;

            list.prepend(aiLi);
            list.prepend(userLi);

            // 4️⃣ Clear input
            document.getElementById("inputBox").value = "";
        }

        async function loadData() {
            const {
                data
            } = await supabaseClient
                .from("requests")
                .select("*")
                .order("id", {
                    ascending: false
                });

            const list = document.getElementById("list");
            list.innerHTML = "";

            data.forEach(item => {
                const li = document.createElement("li");
                li.innerText = "🧑 " + item.text;
                list.appendChild(li);
            });
        }

        loadData();
    </script>
    ```

</body>

</html>
